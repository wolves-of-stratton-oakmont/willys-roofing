<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" role="img" aria-label="Willy's Roofing">
  <title>Willy's Roofing</title>
  <!--
    Willy's Roofing — primary mark.
    An asphalt-shingle gable seen in three-quarter view, built from stacked,
    ascending "courses": a copper ridge cap (the thing Willy's Roofing) over three
    weathered-slate courses, finished with an overhanging eave board.
    Off-centre ridge = a real pitched roof, not a symmetrical pyramid.
    Geometry derived once; reused across lockups, favicon and OG art.
  -->
  <g>
    <!-- weathered-slate courses (eave → just below ridge) -->
    <path d="M7.41 29.8 L38.8 29.8 L42 33 L6 33 Z" fill="#28384A"/>
    <path d="M10.49 22.8 L31.8 22.8 L38 29 L7.76 29 Z" fill="#3A4D61"/>
    <path d="M13.57 15.8 L24.8 15.8 L31 22 L10.84 22 Z" fill="#28384A"/>
    <!-- copper ridge cap — the "Willy's Roofing" -->
    <path d="M15.6 8 L18.4 8 L24 15 L13.92 15 Z" fill="#C26B2C"/>
    <!-- overhanging eave board -->
    <rect x="4" y="33.7" width="40" height="3" rx="0.6" fill="#28384A"/>
  </g>
</svg>
