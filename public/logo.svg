<svg xmlns="http://www.w3.org/2000/svg" width="372" height="84" viewBox="0 0 372 84" role="img" aria-label="Willy's Roofing">
  <title>Willy's Roofing</title>
  <!-- Horizontal lockup for light backgrounds. Mark + Archivo wordmark (slate)
       + IBM Plex Mono "ROOFING" label (copper). Self-contained; text uses the
       brand font-families with safe grotesque/mono fallbacks. -->
  <!-- ===== Mark (gable of stacked courses), scaled into a 60px box ===== -->
  <g transform="translate(6 11) scale(1.25)">
    <path d="M7.41 29.8 L38.8 29.8 L42 33 L6 33 Z" fill="#28384A"/>
    <path d="M10.49 22.8 L31.8 22.8 L38 29 L7.76 29 Z" fill="#3A4D61"/>
    <path d="M13.57 15.8 L24.8 15.8 L31 22 L10.84 22 Z" fill="#28384A"/>
    <path d="M15.6 8 L18.4 8 L24 15 L13.92 15 Z" fill="#C26B2C"/>
    <rect x="4" y="33.7" width="40" height="3" rx="0.6" fill="#28384A"/>
  </g>
  <!-- ===== Wordmark ===== -->
  <text x="92" y="46"
        font-family="Archivo, 'Helvetica Neue', Arial, sans-serif"
        font-size="38" font-weight="800" letter-spacing="-0.5"
        fill="#28384A">WILLY'S</text>
  <text x="94" y="69"
        font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace"
        font-size="14.5" font-weight="500" letter-spacing="7.2"
        fill="#C26B2C">ROOFING</text>
</svg>
